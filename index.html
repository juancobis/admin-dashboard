<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header class="header">
      
    </header>

    <div class="sidebar">
      <div class="logo">
        <img src="svg/view-grid.svg" alt="" width="48px" height="48px">
        <h1>Dashboard</h1>
      </div>

      <div class="user-options">
        <div id="home">
          <img src="svg/home.svg" alt="" width="32px" height="32px">
          <p>Home</p>
        </div>
        <div id="profile">
          <img src="svg/card-account-details-outline.svg" alt="" width="32px" height="32px">
          <p>Profile</p>
        </div>
        <div id="messages">
          <img src="svg/message.svg" alt="" width="32px" height="32px">
          <p>Messages</p>
        </div>
        <div id="history">
          <img src="svg/history.svg" alt="" width="32px" height="32px">
          <p>History</p>
        </div>
        <div id="tasks">
          <img src="svg/check-circle-outline.svg" alt="" width="32px" height="32px">
          <p>Tasks</p>
        </div>
        <div id="communities">
          <img src="svg/account-group.svg" alt="" width="32px" height="32px">
          <p>Communities</p>
        </div>
      </div>
      
      <div class="other-options">
        <div id="settings">
          <img src="svg/cog.svg" alt="" width="32px" height="32px">
          <p>Settings</p>
        </div>
        <div id="support">
          <img src="svg/help-circle.svg" alt="" width="32px" height="32px">
          <p>Support</p>
        </div>
        <div id="privacy">
          <img src="svg/shield-check.svg" alt="" width="32px" height="32px">
          <p>Privacy</p>
        </div>
      </div>
    </div>
  
    <main class="main">
  
    </main>
  </div>
</body>
</html>
